<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080f1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1a35;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9b59b6;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#00d4ff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105" />
    <line x1="0" y1="210" x2="1200" y2="210" />
    <line x1="0" y1="315" x2="1200" y2="315" />
    <line x1="0" y1="420" x2="1200" y2="420" />
    <line x1="0" y1="525" x2="1200" y2="525" />
    <line x1="200" y1="0" x2="200" y2="630" />
    <line x1="400" y1="0" x2="400" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="800" y1="0" x2="800" y2="630" />
    <line x1="1000" y1="0" x2="1000" y2="630" />
  </g>

  <!-- Cyan accent glow circle (top right) -->
  <circle cx="1050" cy="150" r="200" fill="#00d4ff" opacity="0.04" />
  <circle cx="150" cy="500" r="160" fill="#9b59b6" opacity="0.05" />

  <!-- Accent line -->
  <rect x="0" y="314" width="1200" height="2" fill="url(#accentLine)" opacity="0.6" />

  <!-- Atom icon (simplified SVG circles) -->
  <g transform="translate(110, 315)" opacity="0.9">
    <!-- Nucleus -->
    <circle cx="0" cy="0" r="12" fill="#00d4ff" />
    <!-- Orbit 1 -->
    <ellipse cx="0" cy="0" rx="60" ry="24" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5" />
    <!-- Orbit 2 -->
    <ellipse cx="0" cy="0" rx="60" ry="24" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5" transform="rotate(60)" />
    <!-- Orbit 3 -->
    <ellipse cx="0" cy="0" rx="60" ry="24" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5" transform="rotate(120)" />
    <!-- Electrons -->
    <circle cx="60" cy="0" r="5" fill="#00d4ff" />
    <circle cx="-30" cy="-52" r="5" fill="#9b59b6" />
    <circle cx="-30" cy="52" r="5" fill="#00d4ff" opacity="0.7" />
  </g>

  <!-- Main title -->
  <text x="600" y="250" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-weight="800" font-size="96" fill="#ffffff" text-anchor="middle" letter-spacing="-2">NeuroPhysics</text>

  <!-- Cyan underline accent -->
  <rect x="300" y="272" width="600" height="4" rx="2" fill="#00d4ff" opacity="0.8" />

  <!-- Subtitle -->
  <text x="600" y="360" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-weight="400" font-size="36" fill="#b0c4de" text-anchor="middle" letter-spacing="0.5">GCSE Physics for neurodivergent learners</text>

  <!-- Release board pills -->
  <g transform="translate(600, 440)" text-anchor="middle">
    <rect x="-125" y="-22" width="90" height="44" rx="22" fill="#00d4ff" opacity="0.16" stroke="#00d4ff" stroke-width="1" />
    <text x="-80" y="7" font-family="system-ui, sans-serif" font-weight="700" font-size="20" fill="#00d4ff">AQA</text>
    <rect x="5" y="-22" width="120" height="44" rx="22" fill="#00d4ff" opacity="0.12" stroke="#00d4ff" stroke-width="1" />
    <text x="65" y="7" font-family="system-ui, sans-serif" font-weight="700" font-size="20" fill="#7ec8e3">Edexcel</text>
  </g>

  <!-- Tagline at bottom -->
  <text x="600" y="560" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-weight="400" font-size="24" fill="#4a6fa5" text-anchor="middle">neurophysics.co.uk</text>
</svg>
